# secret-example.yaml
# Kubernetes Secret template for the Typesense API key
#
# !! IMPORTANT: Do NOT commit real API keys to version control.
#    Replace YOUR_TYPESENSE_API_KEY with your actual key only when applying,
#    or use the kubectl command below instead of this file.
#
# Recommended approach (no file with real secrets):
#   kubectl create secret generic typesense-api-key \
#     --from-literal=api-key=YOUR_TYPESENSE_API_KEY \
#     -n newrelic
#
# Alternative — apply this file after substituting the value:
#   export API_KEY=your-actual-key
#   sed "s/YOUR_TYPESENSE_API_KEY/$API_KEY/" k8s/secret-example.yaml | kubectl apply -f -
#
# Verify after creation:
#   kubectl get secret typesense-api-key -n newrelic
#   kubectl get secret typesense-api-key -n newrelic -o jsonpath='{.data.api-key}' | base64 -d

apiVersion: v1
kind: Secret
metadata:
  name: typesense-api-key
  namespace: newrelic  # Must match the namespace of the Infrastructure Agent
type: Opaque
stringData:
  # stringData allows plain text — Kubernetes will base64-encode it automatically
  api-key: YOUR_TYPESENSE_API_KEY