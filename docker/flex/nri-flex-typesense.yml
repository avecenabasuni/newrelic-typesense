# nri-flex-typesense.yml
# Flex config for Typesense monitoring in Docker / Docker Compose
#
# Mount this file into the newrelic-infra container at:
#   /etc/newrelic-infra/integrations.d/nri-flex-typesense.yml
#
# See docker-compose.yml for the volume mount configuration.
#
# With network_mode: host, Typesense is reachable at localhost:8108.
# Without network_mode: host, replace localhost with the Typesense
# service name (e.g., http://typesense:8108).
#
# TYPESENSE_API_KEY is passed as an environment variable from .env
# via docker-compose.yml.

integrations:
  - name: nri-flex
    interval: 60s
    config:
      name: TypesenseMonitoring
      apis:

        # ── 1. Health Check ──────────────────────────────────────────────
        # Event type: TypesenseHealthSample
        # Key field:  ok (String — "true" or "false", NOT a boolean)
        - name: TypesenseHealth
          url: http://localhost:8108/health
          headers:
            X-TYPESENSE-API-KEY: ${TYPESENSE_API_KEY}

        # ── 2. Request Stats & Latency ───────────────────────────────────
        # Event type: TypesenseStatsSample
        - name: TypesenseStats
          url: http://localhost:8108/stats.json
          headers:
            X-TYPESENSE-API-KEY: ${TYPESENSE_API_KEY}

        # ── 3. System Metrics ────────────────────────────────────────────
        # Event type: TypesenseMetricsSample
        - name: TypesenseMetrics
          url: http://localhost:8108/metrics.json
          headers:
            X-TYPESENSE-API-KEY: ${TYPESENSE_API_KEY}